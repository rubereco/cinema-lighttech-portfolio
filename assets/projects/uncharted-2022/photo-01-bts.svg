<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="p-uncharted-bts-0" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f2733"/>
      <stop offset="100%" stop-color="#2a3548"/>
    </linearGradient>
    <pattern id="g-uncharted-bts-0" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.6" fill="#ffffff" opacity="0.04"/>
    </pattern>
  </defs>
  <rect width="800" height="800" fill="url(#p-uncharted-bts-0)"/>
  <rect width="800" height="800" fill="url(#g-uncharted-bts-0)"/>

  <!-- Kind badge top-left -->
  <g transform="translate(40,40)">
    <rect x="0" y="0" width="120" height="40" rx="20" fill="#8B7AB8" opacity="0.95"/>
    <text x="60" y="26" text-anchor="middle" font-family="ui-sans-serif,system-ui" font-size="14" font-weight="700" fill="#0b0b0d" letter-spacing="3">BTS</text>
  </g>

  <!-- Frame number top-right (cinematic) -->
  <g transform="translate(760,52)" opacity="0.6">
    <text x="0" y="0" text-anchor="end" font-family="ui-monospace,monospace" font-size="14" fill="#f4f4f4" letter-spacing="2">001 / 005</text>
  </g>

  <!-- Camera/aperture icon centre -->
  <g transform="translate(400,400)" opacity="0.18">
    <circle cx="0" cy="0" r="80" fill="none" stroke="#8B7AB8" stroke-width="4"/>
    <circle cx="0" cy="0" r="50" fill="none" stroke="#8B7AB8" stroke-width="3"/>
    <circle cx="0" cy="0" r="20" fill="#8B7AB8"/>
  </g>

  <!-- Bottom caption -->
  <g transform="translate(40,720)">
    <text x="0" y="0" font-family="ui-sans-serif,system-ui" font-size="18" font-weight="600" fill="#f4f4f4" opacity="0.85">Uncharted</text>
    <text x="0" y="26" font-family="ui-sans-serif,system-ui" font-size="13" font-weight="500" fill="#8B7AB8" letter-spacing="3" opacity="0.8">2022 · BTS</text>
  </g>
</svg>