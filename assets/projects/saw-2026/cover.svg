<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg-saw" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1d"/>
      <stop offset="100%" stop-color="#0b0b0d"/>
    </linearGradient>
    <pattern id="grain-saw" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.5" fill="#ffffff" opacity="0.03"/>
    </pattern>
  </defs>
  <rect width="720" height="900" fill="url(#bg-saw)"/>
  <rect width="720" height="900" fill="url(#grain-saw)"/>

  <!-- Diagonal slate stripes top -->
  <g transform="translate(0,0)" opacity="0.85">
    <rect x="0" y="0" width="24" height="68" fill="#ffffff" transform="skewX(-20)"/><rect x="48" y="0" width="24" height="68" fill="#0b0b0d" transform="skewX(-20)"/><rect x="96" y="0" width="24" height="68" fill="#ffffff" transform="skewX(-20)"/><rect x="144" y="0" width="24" height="68" fill="#0b0b0d" transform="skewX(-20)"/><rect x="192" y="0" width="24" height="68" fill="#ffffff" transform="skewX(-20)"/><rect x="240" y="0" width="24" height="68" fill="#0b0b0d" transform="skewX(-20)"/><rect x="288" y="0" width="24" height="68" fill="#ffffff" transform="skewX(-20)"/><rect x="336" y="0" width="24" height="68" fill="#0b0b0d" transform="skewX(-20)"/>
  </g>

  <g transform="translate(520, 36)">
         <rect x="0" y="0" width="170" height="40" rx="20" fill="#E8A33D" opacity="0.95"/>
         <text x="85" y="27" text-anchor="middle" font-family="ui-sans-serif,system-ui" font-size="13" font-weight="700" fill="#0b0b0d" letter-spacing="2">IN PRODUCTION</text>
       </g>

  <!-- Big clapperboard icon (visual mass in upper-middle) -->
  <g transform="translate(200, 220)" opacity="0.18">
    <rect x="0" y="0" width="320" height="220" rx="8" fill="#E8A33D"/>
    <rect x="0" y="0" width="320" height="56" fill="#0b0b0d"/>
    <rect x="0" y="56" width="320" height="18" fill="#E8A33D"/>
    <rect x="0" y="74" width="320" height="14" fill="#0b0b0d"/>
  </g>

  <!-- Aperture circle (decorative) -->
  <g transform="translate(360, 380)" opacity="0.16">
    <circle cx="0" cy="0" r="72" fill="none" stroke="#E8A33D" stroke-width="3"/>
    <circle cx="0" cy="0" r="48" fill="none" stroke="#E8A33D" stroke-width="2"/>
    <circle cx="0" cy="0" r="18" fill="#E8A33D"/>
  </g>

  <!-- Title block (bottom) -->
  <g transform="translate(36, 720)">
    <text x="0" y="0" font-family="ui-sans-serif,system-ui" font-size="20" font-weight="500" fill="#9b9b9e" letter-spacing="6">2026</text>
    <line x1="0" y1="22" x2="64" y2="22" stroke="#E8A33D" stroke-width="3"/>
    <text x="0" y="84" font-family="'Anton',Impact,sans-serif" font-size="64" font-weight="700" fill="#f4f4f4" letter-spacing="1">Saw</text>
    <text x="0" y="130" font-family="ui-sans-serif,system-ui" font-size="18" font-weight="600" fill="#E8A33D" letter-spacing="4">GAFFER</text>
  </g>

  <!-- Placeholder corner mark -->
  <g transform="translate(684, 876)" opacity="0.5">
    <text x="0" y="0" text-anchor="end" font-family="ui-monospace,monospace" font-size="11" fill="#6b6b6e">PLACEHOLDER</text>
  </g>
</svg>