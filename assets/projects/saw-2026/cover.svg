<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg-saw" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1d"/>
      <stop offset="100%" stop-color="#0b0b0d"/>
    </linearGradient>
    <pattern id="grain-saw" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.5" fill="#ffffff" opacity="0.03"/>
    </pattern>
  </defs>
  <rect width="960" height="720" fill="url(#bg-saw)"/>
  <rect width="960" height="720" fill="url(#grain-saw)"/>

  <!-- Diagonal slate stripes top -->
  <g transform="translate(0,0)" opacity="0.85">
    <rect x="0" y="0" width="30" height="80" fill="#ffffff" transform="skewX(-20)"/><rect x="60" y="0" width="30" height="80" fill="#0b0b0d" transform="skewX(-20)"/><rect x="120" y="0" width="30" height="80" fill="#ffffff" transform="skewX(-20)"/><rect x="180" y="0" width="30" height="80" fill="#0b0b0d" transform="skewX(-20)"/><rect x="240" y="0" width="30" height="80" fill="#ffffff" transform="skewX(-20)"/><rect x="300" y="0" width="30" height="80" fill="#0b0b0d" transform="skewX(-20)"/><rect x="360" y="0" width="30" height="80" fill="#ffffff" transform="skewX(-20)"/><rect x="420" y="0" width="30" height="80" fill="#0b0b0d" transform="skewX(-20)"/>
  </g>

  <!-- Big clapperboard symbol -->
  <g transform="translate(80,200)" opacity="0.15">
    <rect x="0" y="0" width="320" height="240" rx="8" fill="#E8A33D"/>
    <rect x="0" y="0" width="320" height="60" fill="#0b0b0d"/>
    <rect x="0" y="60" width="320" height="20" fill="#E8A33D"/>
  </g>

  <g transform="translate(720,40)">
         <rect x="0" y="0" width="200" height="44" rx="22" fill="#E8A33D" opacity="0.95"/>
         <text x="100" y="29" text-anchor="middle" font-family="ui-sans-serif,system-ui" font-size="16" font-weight="700" fill="#0b0b0d" letter-spacing="2">IN PRODUCTION</text>
       </g>

  <!-- Title block -->
  <g transform="translate(80,500)">
    <text x="0" y="0" font-family="ui-sans-serif,system-ui" font-size="22" font-weight="500" fill="#9b9b9e" letter-spacing="6">2026</text>
    <line x1="0" y1="20" x2="80" y2="20" stroke="#E8A33D" stroke-width="3"/>
    <text x="0" y="80" font-family="'Anton',Impact,sans-serif" font-size="72" font-weight="700" fill="#f4f4f4" letter-spacing="1">Saw</text>
    <text x="0" y="130" font-family="ui-sans-serif,system-ui" font-size="20" font-weight="600" fill="#E8A33D" letter-spacing="4">GAFFER</text>
  </g>

  <!-- Placeholder corner mark -->
  <g transform="translate(880,680)" opacity="0.5">
    <text x="0" y="0" text-anchor="end" font-family="ui-monospace,monospace" font-size="12" fill="#6b6b6e">PLACEHOLDER</text>
  </g>
</svg>